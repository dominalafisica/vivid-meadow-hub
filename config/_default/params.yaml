# ══════════════════════════════════════════════════════════════════════════════
# HUGO BLOX CONFIGURATION
# Schema: hugoblox.com/schema/v2
# Tutorial: https://docs.hugoblox.com/tutorial/
# Documentation: https://docs.hugoblox.com/
# ══════════════════════════════════════════════════════════════════════════════
hugoblox:
  schema: "2.0"

  # ────────────────────────────────────────────────────────────────────────────
  # IDENTITY
  # Site-level branding
  # ────────────────────────────────────────────────────────────────────────────
  identity:
    name: "Domina la Física"
    organization: "Domina la Física"
    type: person
    tagline: ""
    description: 'The purpose of the project "Domina la Física" is to provide a high-quality free resource for anyone interested in understanding physics in a comprehensive manner.'
    social:
      twitter: ""

  # ────────────────────────────────────────────────────────────────────────────
  # THEME
  # Color and visual design system
  # ────────────────────────────────────────────────────────────────────────────
  theme:
    mode: dark
    pack: "default"
    colors:
      primary: ""
      secondary: ""
      neutral: ""
    colors_light: {}
    colors_dark: {}
    surfaces:
      background: ""
      foreground: ""
      header:
        background: ""
        foreground: ""
      footer:
        background: ""
        foreground: ""

  # ────────────────────────────────────────────────────────────────────────────
  # TYPOGRAPHY
  # Font and text sizing
  # ────────────────────────────────────────────────────────────────────────────
  typography:
    pack: "modern"

  # ────────────────────────────────────────────────────────────────────────────
  # LAYOUT
  # Spacing and shape tokens
  # ────────────────────────────────────────────────────────────────────────────
  layout:
    radius: "md"
    spacing: "comfortable"
    avatar_shape: circle

  # ────────────────────────────────────────────────────────────────────────────
  # HEADER
  # Site header and navigation bar
  # ────────────────────────────────────────────────────────────────────────────
  header:
    enable: true
    style: navbar
    sticky: true
    align: center
    search: true
    theme_toggle: true
    theme_picker: false
    language_switcher: true
    cta:
      enable: false
      text: ""
      url: ""

 # ────────────────────────────────────────────────────────────────────────────
# ────────────────────────────────────────────────────────────────────────────
  # FOOTER
  # ────────────────────────────────────────────────────────────────────────────
  footer:
    style: minimal
    text: |
      <div style="display: flex; justify-content: center; margin-bottom: 20px;">
        <a href="https://paypal.me/dominalafisica" target="_blank" rel="noopener" style="display: flex; align-items: center; gap: 14px; font-size: 1.15rem; color: #b0b0b0; text-decoration: none; transition: 0.2s; opacity: 0.9;" onmouseover="this.style.opacity=1; this.style.color='#ffffff'" onmouseout="this.style.opacity=0.9; this.style.color='#b0b0b0'">
          <span style="background: #ffffff; display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.4); padding: 2px;">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="width: 24px; height: 24px;">
              <path fill="#003087" d="M23.3 9.4c0-4.6-3.4-7.4-8.3-7.4H6.8c-.7 0-1.2.5-1.3 1.2l-3.3 21c-.1.5.3 1 1 1h6.1c.6 0 1.1-.4 1.2-1l1.4-8.8c.1-.6.6-1.1 1.2-1.1h2.2c5.5 0 10-3.5 10-4.9z"/>
              <path fill="#009cde" d="M24.2 10.7c-.3 5.3-3.6 8.1-8.5 8.1H12.8c-.5 0-1 .4-1.1 1l-1.4 8.8c-.1.5.3 1 1 1h5.8c.6 0 1.1-.4 1.2-1l1.4-8.8c.1-.6.6-1.1 1.2-1.1h.8c4.6 0 7.7-2.5 8.3-7.1.1-.6.1-1.1.1-1.7 0-.3-.1-.6-.4-.6-.2 0-.3.2-.5.5z"/>
            </svg>
          </span>
          <span style="font-weight: 500;">Support the Project: dominalafisica</span>
        </a>
      </div>

  copyright:
    notice: "<span>© 2026 Domina la Física · Licensed under {license}</span>"
    license:
      enable: true
      type: cc
      allow_derivatives: false
      share_alike: true
      allow_commercial: false
    title: ""
    location:
      address:
        street: ""
        city: ""
        region: ""
        postal_code: ""
        country: ""
      coordinates:
        latitude: null
        longitude: null
      phone: ""
    ai:
      allow:
        - /
      disallow: []
      note: ""
      contact: ""

  # ────────────────────────────────────────────────────────────────────────────
  # CONTENT
  # Content rendering and behavior
  # ────────────────────────────────────────────────────────────────────────────
  content:
    math:
      enable: true
    toc:
      enable: true
    reading_time:
      enable: true
    citations:
      style: apa

  # ────────────────────────────────────────────────────────────────────────────
  # SEARCH
  # Site search
  # ────────────────────────────────────────────────────────────────────────────
  search:
    enable: true
    suggestions: []
    quick_actions: []

  # ────────────────────────────────────────────────────────────────────────────
  # COMMENTS
  # User comments system
  # ────────────────────────────────────────────────────────────────────────────
  comments:
    enable: false
    provider: ""
    giscus:
      repo: ""
      repo_id: ""
      category: ""
      category_id: ""
    disqus:
      shortname: ""

  # ────────────────────────────────────────────────────────────────────────────
  # ANALYTICS
  # Traffic and behavior analytics
  # ────────────────────────────────────────────────────────────────────────────
  analytics:
    google:
      measurement_id: ""
    google_tag_manager:
      container_id: ""
    plausible:
      domain: ""
    fathom:
      site_id: ""
    pirsch:
      site_id: ""
    clarity:
      project_id: ""
    baidu:
      site_id: ""

  # ────────────────────────────────────────────────────────────────────────────
  # VERIFICATION
  # Search engine site verification codes
  # ────────────────────────────────────────────────────────────────────────────
  verification:
    google: ""
    bing: ""
    baidu: ""
    yandex: ""
    pinterest: ""
    naver: ""

  # ────────────────────────────────────────────────────────────────────────────
  # REPOSITORY
  # Source code repository for "Edit this page" links
  # ────────────────────────────────────────────────────────────────────────────
  repository:
    enable: false
    url: ""
    branch: main
    content_dir: content

  # ────────────────────────────────────────────────────────────────────────────
  # LOCALE
  # Regional formatting preferences
  # ────────────────────────────────────────────────────────────────────────────
  locale:
    date_format: "Jan 2, 2006"
    time_format: "3:04 PM"
    address_format: en-us

  # ────────────────────────────────────────────────────────────────────────────
  # SECURITY
  # Security headers and policies
  # ────────────────────────────────────────────────────────────────────────────
  security:
    csp:
      policy: ""
      report_only: false
    frame_options: allow
    permissions_policy: ""

  # ────────────────────────────────────────────────────────────────────────────
  # PRIVACY
  # Privacy and compliance features
  # ────────────────────────────────────────────────────────────────────────────
  privacy:
    enable: false
    anonymize_analytics: true

  # ────────────────────────────────────────────────────────────────────────────
  # DEBUG
  # Development and debugging
  # ────────────────────────────────────────────────────────────────────────────
  debug:
    enable: false
    hud:
      position: bottom-left
      opacity: 1.0
    export_logs: true

  # ────────────────────────────────────────────────────────────────────────────
  # PREMIUM
  # Premium features and creator program
  # ────────────────────────────────────────────────────────────────────────────
  pro:
    hide_attribution: true
    affiliate_code: ""
