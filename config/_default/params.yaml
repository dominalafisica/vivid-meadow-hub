# ══════════════════════════════════════════════════════════════════════════════
# HUGO BLOX CONFIGURATION
# Schema: hugoblox.com/schema/v2
# Tutorial: https://docs.hugoblox.com/tutorial/
# Documentation: https://docs.hugoblox.com/
# ══════════════════════════════════════════════════════════════════════════════
hugoblox:
  schema: "2.0"

  # ────────────────────────────────────────────────────────────────────────────
  # IDENTITY
  # Site-level branding
  # ────────────────────────────────────────────────────────────────────────────
  identity:
    name: "Domina la Física"
    organization: "Domina la Física"
    type: person
    tagline: ""
    description: 'The purpose of the project "Domina la Física" is to provide a high-quality free resource for anyone interested in understanding physics in a comprehensive manner.'
    social:
      twitter: ""

  # ────────────────────────────────────────────────────────────────────────────
  # THEME
  # Color and visual design system
  # ────────────────────────────────────────────────────────────────────────────
  theme:
    mode: dark
    pack: "default"
    colors:
      primary: ""
      secondary: ""
      neutral: ""
    colors_light: {}
    colors_dark: {}
    surfaces:
      background: ""
      foreground: ""
      header:
        background: ""
        foreground: ""
      footer:
        background: ""
        foreground: ""

  # ────────────────────────────────────────────────────────────────────────────
  # TYPOGRAPHY
  # Font and text sizing
  # ────────────────────────────────────────────────────────────────────────────
  typography:
    pack: "modern"

  # ────────────────────────────────────────────────────────────────────────────
  # LAYOUT
  # Spacing and shape tokens
  # ────────────────────────────────────────────────────────────────────────────
  layout:
    radius: "md"
    spacing: "comfortable"
    avatar_shape: circle

  # ────────────────────────────────────────────────────────────────────────────
  # HEADER
  # Site header and navigation bar
  # ────────────────────────────────────────────────────────────────────────────
  header:
    enable: true
    style: navbar
    sticky: true
    align: center
    search: true
    theme_toggle: true
    theme_picker: false
    language_switcher: true
    cta:
      enable: false
      text: ""
      url: ""

 # ────────────────────────────────────────────────────────────────────────────
# ────────────────────────────────────────────────────────────────────────────
  # FOOTER
  # ────────────────────────────────────────────────────────────────────────────
  footer:
    style: minimal
    text: |
      <div style="display: flex; justify-content: center; margin-bottom: 18px;">
        <a href="https://paypal.me/dominalafisica" target="_blank" rel="noopener" style="display: flex; align-items: center; gap: 12px; font-size: 1.1rem; color: #a3a3a3; text-decoration: none; transition: 0.2s;" onmouseover="this.style.color='#ffffff'" onmouseout="this.style.color='#a3a3a3'">
          <span style="background: white; display: flex; align-items: center; justify-content: center; width: 34px; height: 34px; border-radius: 7px; padding: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">
            <svg viewBox="0 0 24 32" style="width: 22px; height: auto;">
              <path fill="#003087" d="M18.1 6.5C18.1 3.1 15.6 1 12 1H5.7c-.5 0-.8.4-.9.9L2.1 20.8c-.1.4.2.8.6.8h4.5c.4 0 .8-.3.9-.7l1-6.4c0-.4.4-.7.8-.7h1.6c4 0 7.3-2.6 7.3-7.3z"/>
              <path fill="#009cde" d="M18.8 7.5c-.2 3.8-2.6 5.8-6.1 5.8H9.3c-.4 0-.7.3-.8.7l-1 6.4c-.1.4.2.8.6.8h4.1c.4 0 .8-.3.9-.7l1-6.4c.1-.4.4-.7.8-.7h.6c3.4 0 5.6-1.8 6.1-5.1.1-.4.1-.8.1-1.2 0-.2-.1-.4-.3-.4z"/>
              <path fill="#012169" d="M12.7 13.3c-.2.4-.6.7-1 .7H9.3c-.4 0-.7.3-.8.7l-.4 2.8c.4-.4.8-.7 1.3-.7h1.6c.3 0 .6-.1.8-.3l.9-3.2z"/>
            </svg>
          </span>
          Support the Project: dominalafisica
        </a>
      </div>
      
  copyright:
    notice: "<span>© 2026 Domina la Física · Licensed under {license}</span>"
    license:
      enable: true
      type: cc
      allow_derivatives: false
      share_alike: true
      allow_commercial: false
    title: ""
    location:
      address:
        street: ""
        city: ""
        region: ""
        postal_code: ""
        country: ""
      coordinates:
        latitude: null
        longitude: null
      phone: ""
    ai:
      allow:
        - /
      disallow: []
      note: ""
      contact: ""

  # ────────────────────────────────────────────────────────────────────────────
  # CONTENT
  # Content rendering and behavior
  # ────────────────────────────────────────────────────────────────────────────
  content:
    math:
      enable: true
    toc:
      enable: true
    reading_time:
      enable: true
    citations:
      style: apa

  # ────────────────────────────────────────────────────────────────────────────
  # SEARCH
  # Site search
  # ────────────────────────────────────────────────────────────────────────────
  search:
    enable: true
    suggestions: []
    quick_actions: []

  # ────────────────────────────────────────────────────────────────────────────
  # COMMENTS
  # User comments system
  # ────────────────────────────────────────────────────────────────────────────
  comments:
    enable: false
    provider: ""
    giscus:
      repo: ""
      repo_id: ""
      category: ""
      category_id: ""
    disqus:
      shortname: ""

  # ────────────────────────────────────────────────────────────────────────────
  # ANALYTICS
  # Traffic and behavior analytics
  # ────────────────────────────────────────────────────────────────────────────
  analytics:
    google:
      measurement_id: ""
    google_tag_manager:
      container_id: ""
    plausible:
      domain: ""
    fathom:
      site_id: ""
    pirsch:
      site_id: ""
    clarity:
      project_id: ""
    baidu:
      site_id: ""

  # ────────────────────────────────────────────────────────────────────────────
  # VERIFICATION
  # Search engine site verification codes
  # ────────────────────────────────────────────────────────────────────────────
  verification:
    google: ""
    bing: ""
    baidu: ""
    yandex: ""
    pinterest: ""
    naver: ""

  # ────────────────────────────────────────────────────────────────────────────
  # REPOSITORY
  # Source code repository for "Edit this page" links
  # ────────────────────────────────────────────────────────────────────────────
  repository:
    enable: false
    url: ""
    branch: main
    content_dir: content

  # ────────────────────────────────────────────────────────────────────────────
  # LOCALE
  # Regional formatting preferences
  # ────────────────────────────────────────────────────────────────────────────
  locale:
    date_format: "Jan 2, 2006"
    time_format: "3:04 PM"
    address_format: en-us

  # ────────────────────────────────────────────────────────────────────────────
  # SECURITY
  # Security headers and policies
  # ────────────────────────────────────────────────────────────────────────────
  security:
    csp:
      policy: ""
      report_only: false
    frame_options: allow
    permissions_policy: ""

  # ────────────────────────────────────────────────────────────────────────────
  # PRIVACY
  # Privacy and compliance features
  # ────────────────────────────────────────────────────────────────────────────
  privacy:
    enable: false
    anonymize_analytics: true

  # ────────────────────────────────────────────────────────────────────────────
  # DEBUG
  # Development and debugging
  # ────────────────────────────────────────────────────────────────────────────
  debug:
    enable: false
    hud:
      position: bottom-left
      opacity: 1.0
    export_logs: true

  # ────────────────────────────────────────────────────────────────────────────
  # PREMIUM
  # Premium features and creator program
  # ────────────────────────────────────────────────────────────────────────────
  pro:
    hide_attribution: true
    affiliate_code: ""
